services:
  - type: worker
    name: agentremote-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_v4.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    plan: free
