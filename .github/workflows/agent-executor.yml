name: AgentRemote v4.0 Cloud Executor

on:
  repository_dispatch:
    types: [execute-task]
  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: true
        default: 'Run diagnostics and report system health'
      chat_id:
        description: 'Telegram chat ID for notifications'
        required: false

jobs:
  execute:
    name: 🤖 Execute Task
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN:           ${{ secrets.GH_TOKEN }}
      GREPTILE_API_KEY:   ${{ secrets.GREPTILE_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_REPOSITORY:  ${{ github.repository }}
      # Support both repository_dispatch and workflow_dispatch
      TASK_DESCRIPTION: >-
        ${{ github.event.client_payload.task || github.event.inputs.task }}
      CHAT_ID: >-
        ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id || secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic requests psutil --break-system-packages

      - name: 🚀 Execute task with Claude
        id: execute
        run: python .github/scripts/cloud_executor_v4.py

      - name: 📦 Commit & push changes
        if: steps.execute.outputs.has_changes == 'true'
        run: |
          git config user.name  "AgentRemote Bot"
          git config user.email "agent@biddeed.ai"
          git add -A
          TASK_SHORT=$(echo "$TASK_DESCRIPTION" | cut -c1-60)
          git commit -m "AgentRemote: ${TASK_SHORT}" 2>/dev/null || echo "Nothing to commit"
          git push origin HEAD 2>/dev/null || echo "Push skipped (branch protection or no changes)"

      - name: 📊 Usage summary
        if: always()
        run: |
          echo "=== AgentRemote v4.0 Run Summary ==="
          echo "Task:       $TASK_DESCRIPTION"
          echo "Iterations: ${{ steps.execute.outputs.iterations }}"
          echo "Changes:    ${{ steps.execute.outputs.has_changes }}"
          echo "Run URL:    https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "GitHub Actions free tier: 2000 min/month (~40 tasks @ 30 min each)"
