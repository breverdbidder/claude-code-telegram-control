name: AgentRemote Self-Test (Zero Human In Loop)

on:
  workflow_dispatch:

jobs:
  self-test:
    name: 🔁 End-to-end self-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN:           ${{ secrets.GH_TOKEN }}

    steps:
      - name: Resolve real chat_id from getUpdates or fallback to secret
        id: resolve_chat
        run: |
          # Try getUpdates to find most recent conversation
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=5")
          CHAT_FROM_UPDATES=$(echo "$UPDATES" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          chats = []
          for u in d.get('result', []):
              for key in ['message', 'callback_query']:
                  if key in u:
                      chat = u[key].get('chat') or u[key].get('message', {}).get('chat', {})
                      if chat.get('id'):
                          chats.append(str(chat['id']))
          print(chats[0] if chats else '')
          " 2>/dev/null || echo "")

          # Use live chat_id if found, else fall back to secret
          FINAL_CHAT_ID="${CHAT_FROM_UPDATES:-$TELEGRAM_CHAT_ID}"
          echo "chat_id=${FINAL_CHAT_ID}" >> $GITHUB_OUTPUT
          echo "Resolved chat_id: ${FINAL_CHAT_ID}"

      - name: Send opening notification to Telegram
        run: |
          CHAT_ID="${{ steps.resolve_chat.outputs.chat_id }}"
          MSG="🔁 *AgentRemote Self-Test*\n\nZero human in the loop — running full end-to-end test\.\n\nTask being dispatched now\.\.\."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"MarkdownV2\"}" | \
            python3 -c "import json,sys; r=json.load(sys.stdin); print('Telegram open:', 'OK' if r.get('ok') else r)"

      - name: Fire repository_dispatch with resolved chat_id
        run: |
          CHAT_ID="${{ steps.resolve_chat.outputs.chat_id }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/breverdbidder/claude-code-telegram-control/dispatches" \
            -d "{\"event_type\":\"execute-task\",\"client_payload\":{\"task\":\"Append a line to CLOUD_READY.md: Self-test passed at $(date -u +%Y-%m-%dT%H:%M:%SZ). This confirms zero-human-in-the-loop execution is live.\",\"chat_id\":\"${CHAT_ID}\",\"message_id\":\"self-test-$(date +%s)\"}}")
          echo "Dispatch HTTP: $RESPONSE"
          if [ "$RESPONSE" = "204" ]; then
            echo "✅ Task dispatched successfully"
          else
            echo "❌ Dispatch failed: $RESPONSE"
            exit 1
          fi

      - name: Wait for executor to complete (poll runs)
        run: |
          sleep 20
          for i in $(seq 1 12); do
            sleep 15
            STATUS=$(curl -s \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/breverdbidder/claude-code-telegram-control/actions/runs?per_page=5" | \
              python3 -c "
          import json,sys
          for r in json.load(sys.stdin)['workflow_runs']:
              if r['event'] == 'repository_dispatch' and r['status'] != 'completed':
                  print('in_progress')
                  break
              elif r['event'] == 'repository_dispatch':
                  print('completed', r['conclusion'])
                  break
          else:
              print('unknown')
          ")
            echo "[$i] $STATUS"
            if echo "$STATUS" | grep -q "completed"; then break; fi
          done

      - name: Confirm CLOUD_READY.md updated
        run: |
          sleep 5
          CONTENT=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "https://api.github.com/repos/breverdbidder/claude-code-telegram-control/contents/CLOUD_READY.md" | \
            python3 -c "import json,sys,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())")
          echo "=== CLOUD_READY.md ==="
          echo "$CONTENT"
          if echo "$CONTENT" | grep -q "Self-test"; then
            echo "✅ File updated by executor — full loop confirmed"
          else
            echo "⚠️  File not yet updated (executor may still be running)"
          fi

      - name: Send confirmation to Telegram
        if: always()
        run: |
          CHAT_ID="${{ steps.resolve_chat.outputs.chat_id }}"
          MSG="✅ *AgentRemote Self-Test Complete*\n\nFull loop verified:\n• Dispatch → GitHub Actions → Claude tool\_use → commit → Telegram\n\nCheck CLOUD\_READY\.md for proof\."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MSG}\",\"parse_mode\":\"MarkdownV2\"}" | \
            python3 -c "import json,sys; r=json.load(sys.stdin); print('Telegram close:', 'OK' if r.get('ok') else r)"
