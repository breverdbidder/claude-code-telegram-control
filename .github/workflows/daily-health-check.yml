name: Daily Infrastructure Health Check

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run Checks
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          python3 << 'SCRIPT'
          import os, json, urllib.request, urllib.parse, ssl

          ctx = ssl.create_default_context()
          results = []

          def check(name, url, headers=None, method="GET", post_data=None):
              try:
                  req = urllib.request.Request(url, headers=headers or {}, method=method, data=post_data)
                  resp = urllib.request.urlopen(req, timeout=10, context=ctx)
                  body = resp.read().decode()[:200]
                  results.append(("OK", name, f"HTTP {resp.status}"))
              except urllib.error.HTTPError as e:
                  # 302/301 redirects are OK for websites
                  results.append(("FAIL", name, f"HTTP {e.code}"))
              except Exception as e:
                  results.append(("FAIL", name, str(e)[:80]))

          def check_site(name, url):
              """Websites returning 200/301/302/403 are all 'up'"""
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  resp = urllib.request.urlopen(req, timeout=10, context=ctx)
                  results.append(("OK", name, f"HTTP {resp.status}"))
              except urllib.error.HTTPError as e:
                  if e.code in (301, 302, 403):
                      results.append(("OK", name, f"HTTP {e.code} (up)"))
                  else:
                      results.append(("FAIL", name, f"HTTP {e.code}"))
              except Exception as e:
                  results.append(("FAIL", name, str(e)[:80]))

          # 1. GitHub PAT
          check("GitHub PAT", "https://api.github.com/user",
                {"Authorization": f"token {os.environ.get('GH_TOKEN','')}"})

          # 2. Telegram Bot
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          check("Telegram Bot", f"https://api.telegram.org/bot{token}/getMe")

          # 3. Anthropic API
          ak = os.environ.get("ANTHROPIC_API_KEY", "")
          if ak:
              try:
                  data = json.dumps({"model":"claude-sonnet-4-20250514","max_tokens":5,"messages":[{"role":"user","content":"1"}]}).encode()
                  req = urllib.request.Request("https://api.anthropic.com/v1/messages", data=data,
                      headers={"x-api-key": ak, "anthropic-version": "2023-06-01", "content-type": "application/json"})
                  resp = urllib.request.urlopen(req, timeout=15, context=ctx)
                  results.append(("OK", "Anthropic API", "Credits OK"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:200]
                  try:
                      msg = json.loads(body).get("error",{}).get("message","")[:60]
                  except:
                      msg = f"HTTP {e.code}"
                  results.append(("FAIL", "Anthropic API", msg))
              except Exception as e:
                  results.append(("FAIL", "Anthropic API", str(e)[:80]))
          else:
              results.append(("WARN", "Anthropic API", "Key not set"))

          # 4. Supabase
          sb_url = os.environ.get("SUPABASE_URL", "")
          sb_key = os.environ.get("SUPABASE_KEY", "")
          if sb_url:
              check("Supabase", f"{sb_url}/rest/v1/",
                    {"apikey": sb_key, "Authorization": f"Bearer {sb_key}"})
          else:
              results.append(("WARN", "Supabase", "URL not set"))

          # 5. Apify - fixed endpoint
          ap = os.environ.get("APIFY_TOKEN", "")
          if ap:
              check("Apify", f"https://api.apify.com/v2/acts?token={ap}&limit=1")
          else:
              results.append(("WARN", "Apify", "Not set"))

          # 6. Render
          rk = os.environ.get("RENDER_API_KEY", "")
          if rk:
              check("Render", "https://api.render.com/v1/owners",
                    {"Authorization": f"Bearer {rk}"})
          else:
              results.append(("WARN", "Render", "Not set"))

          # 7. External sites - with User-Agent and redirect tolerance
          for site in ["realiste.ai", "titleman.ai", "brevard.realforeclose.com"]:
              check_site(site, f"https://{site}")

          # Build report
          icons = {"OK": "\u2705", "FAIL": "\u274c", "WARN": "\u26a0\ufe0f"}
          lines = [f"{icons[s]} {n}: {d}" for s, n, d in results]
          p = sum(1 for s,_,_ in results if s == "OK")
          f = sum(1 for s,_,_ in results if s == "FAIL")
          w = sum(1 for s,_,_ in results if s == "WARN")
          t = p + f + w

          if f > 0:
              header = "\U0001f6a8 ACTION REQUIRED"
          elif w > 0:
              header = "\u26a0\ufe0f WARNINGS"
          else:
              header = "\u2705 ALL CLEAR"

          msg = f"{header}\n\U0001f3e5 Health Check\n{p}/{t} pass | {f} fail | {w} warn\n\n" + "\n".join(lines)
          print(msg)

          # Send to Telegram
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat_id:
              try:
                  data = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
                  req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=data)
                  urllib.request.urlopen(req, timeout=10, context=ctx)
                  print("\nTelegram sent!")
              except Exception as e:
                  print(f"\nTelegram failed: {e}")

          exit(1 if f > 0 else 0)
          SCRIPT
