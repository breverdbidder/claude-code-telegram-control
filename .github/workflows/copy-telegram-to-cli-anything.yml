name: Copy Telegram Secrets to CLI-Anything
on:
  workflow_dispatch: {}

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pynacl
      - name: Push Telegram secrets
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import base64, json, urllib.request, os
          from nacl import encoding, public
          TOKEN = os.environ['GH_TOKEN']
          REPO = 'breverdbidder/cli-anything-biddeed'
          req = urllib.request.Request(f'https://api.github.com/repos/{REPO}/actions/secrets/public-key', headers={'Authorization': f'token {TOKEN}', 'Accept': 'application/vnd.github+json'})
          r = json.loads(urllib.request.urlopen(req).read())
          pk, kid = r['key'], r['key_id']
          def push(name, value):
              if not value:
                  print(f'  SKIP {name}: empty')
                  return
              enc = base64.b64encode(public.SealedBox(public.PublicKey(pk, encoding.Base64Encoder)).encrypt(value.encode())).decode()
              data = json.dumps({'encrypted_value': enc, 'key_id': kid}).encode()
              req = urllib.request.Request(f'https://api.github.com/repos/{REPO}/actions/secrets/{name}', data=data, method='PUT', headers={'Authorization': f'token {TOKEN}', 'Accept': 'application/vnd.github+json'})
              print(f'  OK {name}: HTTP {urllib.request.urlopen(req).status}')
          push('TELEGRAM_BOT_TOKEN', os.environ.get('BOT_TOKEN', ''))
          push('TELEGRAM_CHAT_ID', os.environ.get('CHAT_ID', ''))
          "
